<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление дверями</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>API Client</h1>
    <div>
        <input type="text" id="itemId" placeholder="ID (для getById/delete/put)">
        <input type="text" id="itemName" placeholder="Название (для post/put)">
        <button onclick="fetchAllDoors()">Get All</button>
        <button onclick="createDoor()">Post (Create)</button>
        <button onclick="deleteDoor()">Delete</button>
    </div>

    <div id="output" style="margin-top: 20px; white-space: pre; background: #f0f0f0; padding: 10px;">
        Здесь будет ответ сервера...
    </div>
    <hr>
    <h2>Авторизация и Регистрация</h2>
    <div id="auth-form">
        <input type="login" id="authLogin" placeholder="Логин">
        <input type="password" id="authPassword" placeholder="Пароль">
        <br><br>
        <button onclick="register()">Зарегистрироваться</button>
        <button onclick="login()">Войти</button>
        <p id="authStatus">Статус: Не авторизован</p>
    </div>
    <script src="api.js"></script>
</body>
</html>
